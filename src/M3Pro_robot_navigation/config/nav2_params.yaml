# NAV2 CONFIG (Navigation mode)
# NOTE: This file is for localization + navigation with a static map.
# NOTE: map_server.yaml_filename is overridden by navigation.launch.py map:=...

amcl:
  ros__parameters:
    use_sim_time: true                          # 使用仿真时间
    global_frame_id: map                        # 全局坐标系ID，通常为map
    odom_frame_id: odom                         # 里程计坐标系ID
    base_frame_id: base_footprint               # 机器人基座坐标系ID
    scan_topic: /scan_merged                    # 激光雷达扫描话题，使用融合后的扫描数据
    set_initial_pose: true                      # 启用初始位姿设置
    initial_pose:                               # 初始位姿配置
      x: 0.0                                    # 初始X坐标(米)
      y: 0.0                                    # 初始Y坐标(米)
      z: 0.0                                    # 初始Z坐标(米)
      yaw: 0.0                                  # 初始航向角(弧度)
    min_particles: 300                          # 最小粒子数，定位精度与计算量的平衡
    max_particles: 2000                         # 最大粒子数，复杂环境可增加
    alpha1: 0.2                                 # 平移噪声参数1，x方向平移噪声
    alpha2: 0.2                                 # 平移噪声参数2，y方向平移噪声
    alpha3: 0.2                                 # 平移噪声参数3，旋转噪声
    alpha4: 0.2                                 # 平移噪声参数4，平移导致的旋转噪声
    alpha5: 0.2                                 # 平移噪声参数5，旋转导致的平移噪声

bt_navigator:
  ros__parameters:
    use_sim_time: true                          # 使用仿真时间
    global_frame: map                           # 全局坐标系
    robot_base_frame: base_footprint            # 机器人基座坐标系
    odom_topic: /diff_drive_controller/odom     # 里程计话题路径
    default_bt_xml_filename: /opt/ros/humble/share/nav2_bt_navigator/behavior_trees/navigate_w_replanning_and_recovery.xml
                                                # 默认行为树XML文件路径
    # navigate_to_pose_w_replanning_and_recovery.xml
                                                # 可选的替代行为树配置

planner_server:
  ros__parameters:
    use_sim_time: true                          # 使用仿真时间
    expected_planner_frequency: 3.0             # 期望规划器工作频率(Hz)    # YQL old 5.0 降低期望规划频率，减少 CPU 占用，提升系统稳定性
    planner_plugins: ["GridBased"]              # 启用的规划器插件列表
    GridBased:
      plugin: nav2_navfn_planner/NavfnPlanner   # GridBased规划器插件。使用A*或Dijkstra扩展的导航规划函数，并假设粒子在二维空间（2D）具备完整性约束
      tolerance: 0.5                            # 目标点容差半径(米)，路径终点不必精确
      use_astar: true                           # 使用A*算法而非Dijkstra，提高目标导向性    # YQL old: false
      allow_unknown: true                       # 允许在未知区域规划路径

controller_server:
  ros__parameters:
    use_sim_time: true                          # 使用仿真时间
    odom_topic: /diff_drive_controller/odom     # 控制器使用的里程计话题
    controller_frequency: 10.0                  # 控制器运行频率(Hz)
    min_x_velocity_threshold: 0.001             # X方向最小速度阈值，低于此值视为停止
    min_y_velocity_threshold: 0.0               # Y方向最小速度阈值(差动机器人通常为0)
    min_theta_velocity_threshold: 0.001         # 旋转方向最小速度阈值
    failure_tolerance: 1.2                      # 控制失败容忍度，值越大对失败越容忍   # YQL old: 0.8
    progress_checker_plugins: ["progress_checker"]  # 进度检查器插件列表
    goal_checker_plugins: ["goal_checker"]      # 目标检查器
    controller_plugins: ["FollowPath"]          # 控制器插件列表

    progress_checker:                           # 进度检查器配置
      plugin: nav2_controller::SimpleProgressChecker
      required_movement_radius: 0.05            # 要求的最小移动半径(米)，检测停滞        # YQL old: 0.1
      movement_time_allowance: 15.0             # 最大允许停滞时间(秒)，超时触发恢复行为  # YQL old 10.0 窄门附近给控制器更多时间完成转向，减少过早判定失败

    goal_checker:                               # 目标检查器配置
      plugin: nav2_controller::SimpleGoalChecker
      xy_goal_tolerance: 0.30                   # XY位置目标容差(米)，到达此半径内视为成功
      yaw_goal_tolerance: 0.50                  # 航向角目标容差(弧度)，值太小会导致角度误差无法结束导航。0.5约28度。    # YQL old: 0.3
      stateful: true                            # 状态保持，一旦进入容差范围即视为目标达成

    FollowPath:
      plugin: dwb_core::DWBLocalPlanner                # 动态窗口局部规划器插件
      debug_trajectory_details: false                  # 禁用轨迹细节调试输出，减少日志
      min_vel_x: 0.0                                   # 最小前进线速度
      max_vel_x: 0.30                                  # 最大前进线速度，室内导航推荐0.2-0.3m/s   # YQL old: 0.35
      min_vel_y: 0.0                                   # 最小横向线速度（差动机器人为0）
      max_vel_y: 0.0                                   # 最大横向线速度（差动机器人为0）
      max_vel_theta: 0.6                               # 最大角速度，室内推荐0.5-1.0rad/s   # YQL: old: 0.9
      min_speed_xy: 0.0                                # 最小平面合速度
      max_speed_xy: 0.30                               # 最大平面合速度，应≥max_vel_x       # YQL: old: 0.35
      min_speed_theta: 0.0                             # 最小角速度
      acc_lim_x: 0.8                                   # 线加速度上限，影响启动响应
      decel_lim_x: -1.0                                # 线减速度上限，影响制动能力
      acc_lim_theta: 1.0                               # 角加速度上限，影响转向响应速度  # YQL: 降低角加速度上限，避免门边原地急转（old: 1.5）
      decel_lim_theta: -1.0                            # 角减速度上限，影响停止转向速度  # YQL: 降低角减速度幅度，减小转向过冲（old: -1.5）
      vx_samples: 40                                   # 线速度采样数，值越高轨迹优化越好但计算成本越高   # YQL old: 20
      vtheta_samples: 40                               # 角速度采样数，与vx_samples共同决定候选轨迹总数   # YQL old: 20
      sim_time: 1.5                                    # 轨迹仿真时间，规划器评估未来n秒内的轨迹  # YQL: 缩短前向仿真时域，减少远期激进轨迹对门口决策的干扰（old: 1.5）
      linear_granularity: 0.05                         # 线速度采样间隔
      angular_granularity: 0.025                       # 角速度采样间隔
      transform_tolerance: 0.2                         # TF变换容差时间(秒)，处理坐标系延迟
      # xy_goal_tolerance: 0.25 # Duplicated with goal_checker
      trans_stopped_velocity: 0.05                     # 平移停止判定阈值，速度低于此值视为停止
      short_circuit_trajectory_evaluation: true        # 启用短路轨迹评估，发现碰撞立即停止评估提高效率
      # stateful: true  # Duplicated with goal_checker
      critics: ["RotateToGoal", "Oscillation", "BaseObstacle", "GoalAlign", "PathAlign", "PathDist", "GoalDist"]
                                                      # 启用的代价函数列表，按顺序评估轨迹

      # 代价函数权重参数
      BaseObstacle.scale: 0.02                         # 基础障碍物代价权重，惩罚靠近障碍物的轨迹   # YQL old: 0.06
      PathAlign.scale: 5.0                             # 路径对齐权重，惩罚偏离全局路径的轨迹       # YQL old: 14.0
      PathAlign.forward_point_distance: 0.2            # 前视点距离，控制路径对齐的前向预测距离     # YQL old: 0.1
      GoalAlign.scale: 4.0                             # 目标对齐权重，惩罚不朝向目标点的轨迹       # YQL old: 18.0
      GoalAlign.forward_point_distance: 0.1            # 目标对齐前视距离
      PathDist.scale: 5.0                              # 路径距离权重，惩罚远离全局路径的轨迹       # YQL old: 14.0
      GoalDist.scale: 3.0                              # 目标距离权重，惩罚远离目标点的轨迹         # YQL old: 18.0
      RotateToGoal.scale: 8.0                          # 旋转到目标权重，惩罚不匹配目标朝向的轨迹   # YQL old: 12.0
      RotateToGoal.slowing_factor: 5.0                 # 减速因子，接近目标时降低旋转速度
      RotateToGoal.lookahead_time: -1.0                # 前视时间，-1表示使用sim_time

behavior_server:
  ros__parameters:
    use_sim_time: true                          # 使用仿真时间而非系统真实时间
    costmap_topic: local_costmap/costmap_raw    # 订阅的代价地图话题，用于行为规划
    footprint_topic: local_costmap/published_footprint
                                                # 机器人轮廓话题，获取当前机器人外形
    cycle_frequency: 10.0                       # 行为服务器循环频率(Hz)，每秒执行10次
    behavior_plugins: ["spin", "backup", "wait"]  # 启用的行为插件列表
    spin:                                       # 旋转行为配置
      plugin: nav2_behaviors/Spin               # 旋转行为插件，原地旋转指定角度
    backup:                                     # 后退行为配置
      plugin: nav2_behaviors/BackUp             # 后退行为插件，向后移动指定距离
    wait:                                       # 等待行为配置
      plugin: nav2_behaviors/Wait               # 等待行为插件，暂停执行指定时间
    global_frame: odom                          # 行为执行的全局坐标系，通常为odom
    robot_base_frame: base_footprint            # 机器人基座坐标系
    transform_tolerance: 0.2                    # TF变换容差(秒)，处理坐标系转换延迟

local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: true                          # 使用仿真时间而非系统真实时间
      update_frequency: 5.0                       # 代价地图更新频率(Hz)，每秒更新5次
      publish_frequency: 2.0                      # 代价地图发布频率(Hz)，用于RViz2显示
      global_frame: odom                          # 局部代价地图的全局坐标系，通常设为odom
      robot_base_frame: base_footprint            # 机器人基座坐标系
      rolling_window: true                        # 启用滚动窗口模式，地图随机器人移动
      width: 4                                    # 局部代价地图宽度(米)
      height: 4                                   # 局部代价地图高度(米)
      resolution: 0.05                            # 地图分辨率(米/像素)
      footprint: "[[0.14, 0.11], [0.14, -0.11], [-0.14, -0.11], [-0.14, 0.11]]"
                                                   # 机器人多边形轮廓(基于base_footprint坐标系)
      footprint_padding: 0.01                     # 机器人轮廓外扩距离，增加安全边界   # YQL old: 0.02
      plugins: ["obstacle_layer", "inflation_layer"]  # 启用的代价图层
      obstacle_layer:
        plugin: nav2_costmap_2d::ObstacleLayer    # 障碍物图层插件
        enabled: true                             # 启用障碍物层
        observation_sources: scan                 # 观测源名称
        scan:                                     # 激光雷达配置
          topic: /scan_merged                     # 扫描数据话题，融合后的激光数据
          max_obstacle_height: 2.0                # 最大障碍物高度(米)
          clearing: true                          # 启用障碍物清除(动态障碍物移除)
          marking: true                           # 启用障碍物标记(静态障碍物添加)
          data_type: LaserScan                    # 数据格式为激光扫描
          raytrace_max_range: 12.0                # 射线追踪最大距离，用于清除旧障碍物
          raytrace_min_range: 0.2                 # 射线追踪最小距离
          obstacle_max_range: 10.0                # 障碍物检测最大距离
          obstacle_min_range: 0.2                 # 障碍物检测最小距离
      inflation_layer:
        plugin: nav2_costmap_2d::InflationLayer   # 膨胀图层插件
        cost_scaling_factor: 10.0                 # 代价缩放因子，控制代价值随距离衰减的速度   # YQL old: 2.5  值越高代价则集中在墙边
        inflation_radius: 0.20                    # 局部膨胀半径，障碍物向外扩展的最大距离     # YQL old: 0.3
      always_send_full_costmap: true              # 总是发布完整代价地图，而非差异更新

global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: true                          # 使用仿真时间
      update_frequency: 1.0                       # 全局地图更新频率较低，每秒1次
      publish_frequency: 1.0                      # 全局地图发布频率
      global_frame: map                           # 全局代价地图坐标系，设为map
      robot_base_frame: base_footprint            # 机器人基座坐标系
      footprint: "[[0.14, 0.11], [0.14, -0.11], [-0.14, -0.11], [-0.14, 0.11]]"
                                                   # 机器人多边形轮廓(同局部地图)
      footprint_padding: 0.02                     # 全局轮廓外扩，更保守的安全边界      # YQL old: 0.01
      resolution: 0.05                            # 地图分辨率(同局部地图)
      track_unknown_space: true                   # 跟踪未知空间，将未知区域视为自由
      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]  # 全局地图图层
      static_layer:
        plugin: nav2_costmap_2d::StaticLayer      # 静态图层插件(加载地图文件)
        map_subscribe_transient_local: true       # 使用瞬态本地订阅，提高地图传输效率
      obstacle_layer:
        plugin: nav2_costmap_2d::ObstacleLayer    # 障碍物图层插件
        enabled: true                             # 启用障碍物层
        observation_sources: scan                 # 观测源
        scan:                                     # 激光雷达配置
          topic: /scan_merged                     # 扫描数据话题
          max_obstacle_height: 2.0                # 最大障碍物高度
          clearing: true                          # 启用障碍物清除
          marking: true                           # 启用障碍物标记
          data_type: LaserScan                    # 数据格式
          raytrace_max_range: 12.0                # 射线追踪最大距离
          raytrace_min_range: 0.2                 # 射线追踪最小距离
          obstacle_max_range: 3.0                 # 全局障碍物检测范围较小，只关注附近障碍物     # YQL old: 10.0
          obstacle_min_range: 0.2                 # 障碍物检测最小距离
      inflation_layer:
        plugin: nav2_costmap_2d::InflationLayer   # 膨胀图层插件
        cost_scaling_factor: 10.0                 # 代价缩放因子，值越大代价衰减越慢        # YQL old: 8.0
        inflation_radius: 0.30                    # 全局膨胀半径较大，提供更宽的安全边界    # YQL old: 0.30
      always_send_full_costmap: true              # 总是发布完整代价地图

map_server:
  ros__parameters:
    use_sim_time: true                          # 使用仿真时间
    yaml_filename: ''                           # 地图YAML文件路径，通常由launch文件参数传入

lifecycle_manager_navigation:
  ros__parameters:
    use_sim_time: true                          # 使用仿真时间
    autostart: true                             # 启用自动启动，节点自动按顺序配置和激活
    node_names: ["map_server", "amcl", "planner_server", "controller_server", "behavior_server", "bt_navigator"]
                                                # 生命周期管理的节点列表，按顺序启动
