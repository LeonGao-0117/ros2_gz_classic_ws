
amcl:
  ros__parameters:
    use_sim_time: true
    global_frame_id: map
    odom_frame_id: odom
    base_frame_id: base_footprint
    scan_topic: /scan_merged
    set_initial_pose: true
    initial_pose:
      x: 0.0
      y: 0.0
      z: 0.0
      yaw: 0.0
    min_particles: 300
    max_particles: 2000
    alpha1: 0.2
    alpha2: 0.2
    alpha3: 0.2
    alpha4: 0.2
    alpha5: 0.2
    recovery_alpha_slow: 0.001   
    recovery_alpha_fast: 0.1

bt_navigator:
  ros__parameters:
    use_sim_time: true
    global_frame: map
    robot_base_frame: base_footprint
    odom_topic: /diff_drive_controller/odom
    default_bt_xml_filename: /opt/ros/humble/share/nav2_bt_navigator/behavior_trees/navigate_to_pose_w_replanning_and_recovery.xml

planner_server:
  ros__parameters:
    use_sim_time: true
    expected_planner_frequency: 3.0
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: nav2_smac_planner/SmacPlanner2D
      tolerance: 0.5
      downsample_costmap: false
      downsampling_factor: 1
      allow_unknown: true
      max_iterations: 1000000
      max_on_approach_iterations: 1000
      max_planning_time: 2.0
      cost_travel_multiplier: 5.0
      use_final_approach_orientation: false
      smoother:
        max_iterations: 1000
        w_smooth: 0.2
        w_data: 0.4
        tolerance: 1e-10

controller_server:
  ros__parameters:
    use_sim_time: true
    odom_topic: /diff_drive_controller/odom
    controller_frequency: 20.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.0
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 1.2
    progress_checker_plugins: ["progress_checker"]
    goal_checker_plugins: ["goal_checker"]
    controller_plugins: ["FollowPath"]

    progress_checker:
      plugin: nav2_controller::SimpleProgressChecker
      required_movement_radius: 0.03
      movement_time_allowance: 12.0
    goal_checker:
      plugin: nav2_controller::SimpleGoalChecker
      xy_goal_tolerance: 0.30
      yaw_goal_tolerance: 0.6
      stateful: true

    FollowPath:
      plugin: "nav2_mppi_controller::MPPIController"
      time_steps: 56
      model_dt: 0.05
      batch_size: 600
      vx_std: 0.4
      vy_std: 0.0
      wz_std: 1.2
      vx_max: 0.65
      vx_min: -0.35
      vy_max: 0.0
      vy_min: 0.0
      wz_max: 1.5
      wz_min: -1.5
      iteration_count: 1
      prune_distance: 1.7
      transform_tolerance: 0.1
      temperature: 0.3
      gamma: 0.015
      motion_model: "DiffDrive"
      visualize: true
      TrajectoryVisualizer:
        trajectory_step: 5
        time_step: 3
      critics: ["ConstraintCritic", "CostCritic", "GoalCritic", "GoalAngleCritic", "PathAlignCritic", "PathFollowCritic", "PathAngleCritic", "PreferForwardCritic"]
      ConstraintCritic:
        enabled: true
        cost_power: 1
        cost_weight: 8.0
      CostCritic:
        enabled: true
        cost_power: 1
        cost_weight: 3.0
        critical_cost: 300.0
        consider_footprint: true  
      GoalCritic:
        enabled: true
        cost_power: 1
        cost_weight: 4.0
        threshold_to_keep: 2.0
      GoalAngleCritic:
        enabled: true
        cost_power: 1
        cost_weight: 6.0
        threshold_to_keep: 2.0
      PathAlignCritic:
        enabled: true
        cost_power: 1
        cost_weight: 4.5
      PathFollowCritic:
        enabled: true
        cost_power: 1
        cost_weight: 6.5
        offset_from_furthest: 20
      PathAngleCritic:
        enabled: true
        cost_power: 1
        cost_weight: 5.0
        offset_from_furthest: 4
        threshold_to_keep: 0.5
        mode: 2
      PreferForwardCritic:
        enabled: true
        cost_power: 1
        cost_weight: 6.5
        threshold_to_keep: 0.5

behavior_server:
  ros__parameters:
    use_sim_time: true
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: ["spin", "backup", "wait"]
    spin:
      plugin: nav2_behaviors/Spin
    backup:
      plugin: nav2_behaviors/BackUp
    wait:
      plugin: nav2_behaviors/Wait
    global_frame: odom
    robot_base_frame: base_footprint
    transform_tolerance: 0.2

local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: true
      update_frequency: 5.0
      publish_frequency: 2.0
      global_frame: odom
      robot_base_frame: base_footprint
      rolling_window: true
      width: 5
      height: 5
      resolution: 0.05
      footprint: "[[0.14, 0.11], [0.14, -0.11], [-0.14, -0.11], [-0.14, 0.11]]"
      footprint_padding: 0.01
      plugins: ["obstacle_layer", "inflation_layer"]
      obstacle_layer:
        plugin: nav2_costmap_2d::ObstacleLayer
        enabled: true
        observation_sources: scan
        scan:
          topic: /scan_merged
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: LaserScan
          raytrace_max_range: 12.0
          raytrace_min_range: 0.2
          obstacle_max_range: 3.0
          obstacle_min_range: 0.2
      inflation_layer:
        plugin: nav2_costmap_2d::InflationLayer
        cost_scaling_factor: 6.0
        inflation_radius: 0.28
      always_send_full_costmap: true

global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: true
      update_frequency: 1.0
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: base_footprint
      footprint: "[[0.14, 0.11], [0.14, -0.11], [-0.14, -0.11], [-0.14, 0.11]]"
      footprint_padding: 0.02
      resolution: 0.05
      track_unknown_space: true
      plugins: ["static_layer", "inflation_layer"]
      static_layer:
        plugin: nav2_costmap_2d::StaticLayer
        map_subscribe_transient_local: true
      obstacle_layer:
        plugin: nav2_costmap_2d::ObstacleLayer
        enabled: true
        observation_sources: scan
        scan:
          topic: /scan_merged
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: LaserScan
          raytrace_max_range: 12.0
          raytrace_min_range: 0.2
          obstacle_max_range: 3.0
          obstacle_min_range: 0.2
      inflation_layer:
        plugin: nav2_costmap_2d::InflationLayer
        cost_scaling_factor: 2.5
        inflation_radius: 0.45
      always_send_full_costmap: true

map_server:
  ros__parameters:
    use_sim_time: true
    yaml_filename: ''

lifecycle_manager_navigation:
  ros__parameters:
    use_sim_time: true
    autostart: true
    node_names: ["map_server", "amcl", "planner_server", "controller_server", "behavior_server", "bt_navigator"]
